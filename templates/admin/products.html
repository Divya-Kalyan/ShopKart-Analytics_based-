{% extends "admin/base_admin.html" %}

{% block title %}Products{% endblock %}
{% block page_title %}Products{% endblock %}


{% block content %}

<!-- ── Toolbar: search box + Add button ────────────────────────────────────── -->
<div class="d-flex justify-content-between align-items-center mb-3 gap-2 flex-wrap">

    <input type="text" id="searchInput" class="form-control"
           placeholder="&#x1F50D;  Search by name…" style="max-width: 300px;">

    <!-- Opens the Add Product modal -->
    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addProductModal">
        <i class="bi bi-plus-lg me-1"></i> Add Product
    </button>

</div>


<!-- ── Products Table ───────────────────────────────────────────────────────── -->
<div class="card border-0 shadow-sm">
    <div class="card-body p-0">
        <table class="table table-hover mb-0 align-middle">
            <thead class="table-light">
                <tr>
                    <th class="ps-3">ID</th>
                    <th>Name</th>
                    <th>Category</th>
                    <th>Price</th>
                    <th>Rating</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <!-- Rows injected by JS -->
            <tbody id="productTableBody">
                <tr>
                    <td colspan="6" class="text-center py-4 text-muted">
                        <div class="spinner-border spinner-border-sm me-2"></div> Loading…
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<!-- Pagination buttons (injected by JS) -->
<div id="pagination" class="d-flex justify-content-center gap-2 mt-3 flex-wrap"></div>


<!-- ════════════════════════════════════════════════════════════════════════
     ADD PRODUCT MODAL
     ════════════════════════════════════════════════════════════════════════ -->
<div class="modal fade" id="addProductModal" tabindex="-1" aria-labelledby="addProductModalLabel">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title" id="addProductModalLabel">
                    <i class="bi bi-plus-circle me-1"></i> Add New Product
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">
                <div class="row g-3">

                    <!-- Product name (required) -->
                    <div class="col-12">
                        <label class="form-label">Product Name <span class="text-danger">*</span></label>
                        <input type="text" id="add-name" class="form-control"
                               placeholder="e.g. Sony WH-1000XM5 Headphones">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Category</label>
                        <input type="text" id="add-category" class="form-control"
                               placeholder="e.g. Electronics">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Sub-Category</label>
                        <input type="text" id="add-sub_category" class="form-control"
                               placeholder="e.g. Headphones">
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Price (₹)</label>
                        <input type="number" id="add-price" class="form-control"
                               value="0" min="0" step="0.01">
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Original Price (₹)</label>
                        <input type="number" id="add-actual_price" class="form-control"
                               value="0" min="0" step="0.01">
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Discount</label>
                        <input type="text" id="add-discount_percentage" class="form-control"
                               placeholder="e.g. 10%">
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Rating (0–5)</label>
                        <input type="number" id="add-rating" class="form-control"
                               value="0" min="0" max="5" step="0.1">
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Rating Count</label>
                        <input type="number" id="add-rating_count" class="form-control"
                               value="0" min="0">
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Image URL</label>
                        <input type="url" id="add-img_link" class="form-control"
                               placeholder="https://…">
                    </div>

                    <div class="col-12">
                        <label class="form-label">About Product</label>
                        <textarea id="add-about_product" class="form-control" rows="3"
                                  placeholder="Short product description…"></textarea>
                    </div>

                </div>
                <!-- Error shown here if submission fails -->
                <div id="addError" class="text-danger mt-2 small d-none"></div>
            </div>

            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button class="btn btn-primary" onclick="addProduct()">
                    <i class="bi bi-check-lg me-1"></i> Add Product
                </button>
            </div>

        </div>
    </div>
</div>


<!-- ════════════════════════════════════════════════════════════════════════
     EDIT PRODUCT MODAL
     ════════════════════════════════════════════════════════════════════════ -->
<div class="modal fade" id="editProductModal" tabindex="-1" aria-labelledby="editProductModalLabel">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title" id="editProductModalLabel">
                    <i class="bi bi-pencil me-1"></i> Edit Product
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">
                <!-- Hidden field to store which product we are editing -->
                <input type="hidden" id="edit-pid">

                <div class="row g-3">

                    <div class="col-12">
                        <label class="form-label">Product Name</label>
                        <input type="text" id="edit-name" class="form-control">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Category</label>
                        <input type="text" id="edit-category" class="form-control">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Sub-Category</label>
                        <input type="text" id="edit-sub_category" class="form-control">
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Price (₹)</label>
                        <input type="number" id="edit-price" class="form-control" step="0.01">
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Original Price (₹)</label>
                        <input type="number" id="edit-actual_price" class="form-control" step="0.01">
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Rating (0–5)</label>
                        <input type="number" id="edit-rating" class="form-control" step="0.1">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Discount</label>
                        <input type="text" id="edit-discount_percentage" class="form-control">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Image URL</label>
                        <input type="url" id="edit-img_link" class="form-control">
                    </div>

                    <div class="col-12">
                        <label class="form-label">About Product</label>
                        <textarea id="edit-about_product" class="form-control" rows="3"></textarea>
                    </div>

                </div>
                <div id="editError" class="text-danger mt-2 small d-none"></div>
            </div>

            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button class="btn btn-primary" onclick="saveEditProduct()">
                    <i class="bi bi-check-lg me-1"></i> Save Changes
                </button>
            </div>

        </div>
    </div>
</div>

{% endblock %}


{% block extra_scripts %}
<script>
/* ── State variables ──────────────────────────────────────────────────────── */
let currentPage = 1;   // which page of products we are showing
let searchTimer = null; // timer used to delay search as user types


/* ── Load products from the API ───────────────────────────────────────────── */
function loadProducts(page = 1) {
    currentPage = page;
    const query = document.getElementById('searchInput').value.trim();
    const url   = `/admin/api/products?page=${page}&q=${encodeURIComponent(query)}`;

    fetch(url)
        .then(r => r.json())
        .then(data => {
            renderTable(data.products);
            renderPagination(data.page, data.pages);
        })
        .catch(() => {
            document.getElementById('productTableBody').innerHTML =
                '<tr><td colspan="6" class="text-center py-4 text-danger">Failed to load products.</td></tr>';
        });
}


/* ── Build the table rows from the product array ──────────────────────────── */
function renderTable(products) {
    const tbody = document.getElementById('productTableBody');

    if (!products.length) {
        tbody.innerHTML = '<tr><td colspan="6" class="text-center py-4 text-muted">No products found.</td></tr>';
        return;
    }

    tbody.innerHTML = products.map(p => {
        // Truncate long names so the table stays tidy
        const shortName = p.name.length > 55 ? p.name.slice(0, 55) + '…' : p.name;

        return `
        <tr>
            <td class="ps-3 text-muted small">${p.id}</td>
            <td>
                <!-- Thumbnail -->
                <img src="${p.img_link}"
                     width="38" height="38"
                     class="rounded me-2"
                     style="object-fit:cover; vertical-align:middle;"
                     onerror="this.src='https://picsum.photos/seed/${p.id}/38/38'">
                ${escHtml(shortName)}
            </td>
            <td class="text-muted small">${escHtml(p.category || '—')}</td>
            <td>₹${p.price.toLocaleString()}</td>
            <td>
                <span class="badge bg-warning text-dark">★ ${p.rating.toFixed(1)}</span>
            </td>
            <td>
                <!-- Edit button: opens modal and pre-fills form with this product's data -->
                <button class="btn btn-sm btn-outline-primary me-1"
                        onclick="openEditModal(${p.id})"
                        title="Edit">
                    <i class="bi bi-pencil"></i>
                </button>
                <!-- Delete button -->
                <button class="btn btn-sm btn-outline-danger"
                        onclick="deleteProduct(${p.id}, this)"
                        title="Delete">
                    <i class="bi bi-trash"></i>
                </button>
            </td>
        </tr>`;
    }).join('');
}


/* ── Build pagination buttons ─────────────────────────────────────────────── */
function renderPagination(page, pages) {
    const div = document.getElementById('pagination');
    if (pages <= 1) { div.innerHTML = ''; return; }

    let html = '';

    // Previous button
    html += `<button class="btn btn-sm btn-outline-secondary"
                     ${page === 1 ? 'disabled' : ''}
                     onclick="loadProducts(${page - 1})">‹ Prev</button>`;

    // Page number buttons (show up to 5 around the current page)
    const start = Math.max(1, page - 2);
    const end   = Math.min(pages, page + 2);
    for (let i = start; i <= end; i++) {
        html += `<button class="btn btn-sm ${i === page ? 'btn-primary' : 'btn-outline-secondary'}"
                         onclick="loadProducts(${i})">${i}</button>`;
    }

    // Next button
    html += `<button class="btn btn-sm btn-outline-secondary"
                     ${page === pages ? 'disabled' : ''}
                     onclick="loadProducts(${page + 1})">Next ›</button>`;

    div.innerHTML = html;
}


/* ── Open Edit modal and pre-fill all fields via GET /admin/api/products/<id> */
function openEditModal(pid) {
    // Fetch this single product's data from the API
    fetch(`/admin/api/products/${pid}`)
        .then(r => r.json())
        .then(data => {
            const p = data.product;

            // Fill every form field with existing values
            document.getElementById('edit-pid').value                 = p.id;
            document.getElementById('edit-name').value                = p.name;
            document.getElementById('edit-category').value            = p.category       || '';
            document.getElementById('edit-sub_category').value        = p.sub_category   || '';
            document.getElementById('edit-price').value               = p.price;
            document.getElementById('edit-actual_price').value        = p.actual_price;
            document.getElementById('edit-rating').value              = p.rating;
            document.getElementById('edit-img_link').value            = p.img_link       || '';
            document.getElementById('edit-discount_percentage').value = p.discount_percentage || '';
            document.getElementById('edit-about_product').value       = p.about_product  || '';

            // Hide any previous error message
            document.getElementById('editError').classList.add('d-none');

            // Show the modal
            new bootstrap.Modal(document.getElementById('editProductModal')).show();
        })
        .catch(() => alert('Could not load product data.'));
}


/* ── Send updated product data to the API ─────────────────────────────────── */
function saveEditProduct() {
    const pid  = document.getElementById('edit-pid').value;
    const body = {
        name:                document.getElementById('edit-name').value,
        category:            document.getElementById('edit-category').value,
        sub_category:        document.getElementById('edit-sub_category').value,
        price:               parseFloat(document.getElementById('edit-price').value)        || 0,
        actual_price:        parseFloat(document.getElementById('edit-actual_price').value)  || 0,
        rating:              parseFloat(document.getElementById('edit-rating').value)        || 0,
        img_link:            document.getElementById('edit-img_link').value,
        discount_percentage: document.getElementById('edit-discount_percentage').value,
        about_product:       document.getElementById('edit-about_product').value,
    };

    fetch(`/admin/api/products/${pid}`, {
        method:  'PUT',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify(body),
    })
    .then(r => r.json())
    .then(data => {
        if (data.success) {
            // Close modal and refresh the table
            bootstrap.Modal.getInstance(document.getElementById('editProductModal')).hide();
            loadProducts(currentPage);
        } else {
            document.getElementById('editError').textContent = data.error || 'Update failed.';
            document.getElementById('editError').classList.remove('d-none');
        }
    });
}


/* ── Add a new product ────────────────────────────────────────────────────── */
function addProduct() {
    const body = {
        name:                document.getElementById('add-name').value.trim(),
        category:            document.getElementById('add-category').value.trim(),
        sub_category:        document.getElementById('add-sub_category').value.trim(),
        price:               parseFloat(document.getElementById('add-price').value)         || 0,
        actual_price:        parseFloat(document.getElementById('add-actual_price').value)   || 0,
        discount_percentage: document.getElementById('add-discount_percentage').value.trim(),
        rating:              parseFloat(document.getElementById('add-rating').value)         || 0,
        rating_count:        parseInt(document.getElementById('add-rating_count').value)     || 0,
        img_link:            document.getElementById('add-img_link').value.trim(),
        about_product:       document.getElementById('add-about_product').value.trim(),
    };

    // Simple front-end validation: name is required
    if (!body.name) {
        const errEl = document.getElementById('addError');
        errEl.textContent = 'Product name is required.';
        errEl.classList.remove('d-none');
        return;
    }

    fetch('/admin/api/products', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify(body),
    })
    .then(r => r.json())
    .then(data => {
        if (data.success) {
            bootstrap.Modal.getInstance(document.getElementById('addProductModal')).hide();
            loadProducts(1);  // go to first page so the new product is visible
        } else {
            const errEl = document.getElementById('addError');
            errEl.textContent = data.error || 'Failed to add product.';
            errEl.classList.remove('d-none');
        }
    });
}


/* ── Delete a product ─────────────────────────────────────────────────────── */
function deleteProduct(pid, btn) {
    if (!confirm('Delete this product? This action cannot be undone.')) return;

    btn.disabled = true;  // prevent double-click

    fetch(`/admin/api/products/${pid}`, { method: 'DELETE' })
        .then(r => r.json())
        .then(data => {
            if (data.success) {
                loadProducts(currentPage);  // refresh table
            } else {
                alert('Delete failed. Please try again.');
                btn.disabled = false;
            }
        });
}


/* ── Escape HTML to prevent XSS when inserting user data into the DOM ─────── */
function escHtml(str) {
    return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
}


/* ── Search with debounce ─────────────────────────────────────────────────── */
// Waits 400ms after the user stops typing before sending a request.
// This avoids sending a request for every single keystroke.
document.getElementById('searchInput').addEventListener('input', () => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => loadProducts(1), 400);
});


/* ── Initial page load ────────────────────────────────────────────────────── */
loadProducts();
</script>
{% endblock %}
