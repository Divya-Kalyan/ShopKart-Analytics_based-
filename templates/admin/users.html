{% extends "admin/base_admin.html" %}

{% block title %}Users{% endblock %}
{% block page_title %}Users{% endblock %}


{% block content %}

<!-- ── Users Table ──────────────────────────────────────────────────────────── -->
<div class="card border-0 shadow-sm">
    <div class="card-body p-0">
        <table class="table table-hover mb-0 align-middle">
            <thead class="table-light">
                <tr>
                    <th class="ps-3">ID</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Role</th>
                    <th>Joined</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <!-- Rows injected by JS -->
            <tbody id="usersTableBody">
                <tr>
                    <td colspan="6" class="text-center py-4 text-muted">
                        <div class="spinner-border spinner-border-sm me-2"></div> Loading…
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<!-- Pagination buttons (injected by JS) -->
<div id="pagination" class="d-flex justify-content-center gap-2 mt-3 flex-wrap"></div>


<!-- ════════════════════════════════════════════════════════════════════════
     EDIT USER MODAL
     ════════════════════════════════════════════════════════════════════════ -->
<div class="modal fade" id="editUserModal" tabindex="-1" aria-labelledby="editUserModalLabel">
    <div class="modal-dialog">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title" id="editUserModalLabel">
                    <i class="bi bi-pencil me-1"></i> Edit User
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">
                <!-- Hidden field: keeps track of which user we are editing -->
                <input type="hidden" id="edit-uid">

                <div class="mb-3">
                    <label class="form-label">Name</label>
                    <input type="text" id="edit-name" class="form-control"
                           placeholder="Full name">
                </div>

                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" id="edit-email" class="form-control"
                           placeholder="user@example.com">
                </div>

                <div class="mb-3">
                    <label class="form-label">Role</label>
                    <!-- Only two valid roles exist in the system -->
                    <select id="edit-role" class="form-select">
                        <option value="customer">Customer</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>

                <!-- Error message shown on validation failure -->
                <div id="editUserError" class="text-danger small d-none"></div>
            </div>

            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button class="btn btn-primary" onclick="saveUser()">
                    <i class="bi bi-check-lg me-1"></i> Save Changes
                </button>
            </div>

        </div>
    </div>
</div>

{% endblock %}


{% block extra_scripts %}
<script>
/* ── State ────────────────────────────────────────────────────────────────── */
let currentPage = 1;


/* ── Load users from the API ──────────────────────────────────────────────── */
function loadUsers(page = 1) {
    currentPage = page;

    fetch(`/admin/api/users?page=${page}`)
        .then(r => r.json())
        .then(data => {
            renderTable(data.users);
            renderPagination(data.page, data.pages);
        })
        .catch(() => {
            document.getElementById('usersTableBody').innerHTML =
                '<tr><td colspan="6" class="text-center py-4 text-danger">Failed to load users.</td></tr>';
        });
}


/* ── Build the table rows ─────────────────────────────────────────────────── */
function renderTable(users) {
    const tbody = document.getElementById('usersTableBody');

    if (!users.length) {
        tbody.innerHTML = '<tr><td colspan="6" class="text-center py-4 text-muted">No users found.</td></tr>';
        return;
    }

    tbody.innerHTML = users.map(u => `
        <tr>
            <td class="ps-3 text-muted small">${u.id}</td>
            <td>${escHtml(u.name)}</td>
            <td class="text-muted">${escHtml(u.email)}</td>
            <td>
                <!-- Badge colour: red for admin, grey for customer -->
                <span class="badge ${u.role === 'admin' ? 'bg-danger' : 'bg-secondary'}">
                    ${u.role}
                </span>
            </td>
            <td class="text-muted small">${u.created_at}</td>
            <td>
                <!-- Edit button: pre-fills modal using values already in this row -->
                <button class="btn btn-sm btn-outline-primary me-1"
                        onclick="openEditModal(${u.id}, ${JSON.stringify(u.name)}, ${JSON.stringify(u.email)}, '${u.role}')"
                        title="Edit">
                    <i class="bi bi-pencil"></i>
                </button>
                <!-- Delete button -->
                <button class="btn btn-sm btn-outline-danger"
                        onclick="deleteUser(${u.id}, this)"
                        title="Delete">
                    <i class="bi bi-trash"></i>
                </button>
            </td>
        </tr>
    `).join('');
}


/* ── Open the Edit modal and fill in the current user values ──────────────── */
function openEditModal(uid, name, email, role) {
    document.getElementById('edit-uid').value   = uid;
    document.getElementById('edit-name').value  = name;
    document.getElementById('edit-email').value = email;
    document.getElementById('edit-role').value  = role;

    // Hide any error left from a previous attempt
    document.getElementById('editUserError').classList.add('d-none');

    new bootstrap.Modal(document.getElementById('editUserModal')).show();
}


/* ── Send updated user fields to PUT /admin/api/users/<uid> ───────────────── */
function saveUser() {
    const uid  = document.getElementById('edit-uid').value;
    const body = {
        name:  document.getElementById('edit-name').value.trim(),
        email: document.getElementById('edit-email').value.trim(),
        role:  document.getElementById('edit-role').value,
    };

    fetch(`/admin/api/users/${uid}`, {
        method:  'PUT',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify(body),
    })
    .then(r => r.json())
    .then(data => {
        if (data.success) {
            // Close modal and refresh the table to show updated values
            bootstrap.Modal.getInstance(document.getElementById('editUserModal')).hide();
            loadUsers(currentPage);
        } else {
            // Show the error returned by the API (e.g. duplicate email)
            const errEl = document.getElementById('editUserError');
            errEl.textContent = data.error || 'Update failed.';
            errEl.classList.remove('d-none');
        }
    });
}


/* ── Delete a user ────────────────────────────────────────────────────────── */
function deleteUser(uid, btn) {
    if (!confirm('Delete this user? This cannot be undone.')) return;

    btn.disabled = true;  // prevent double-click while request is in flight

    fetch(`/admin/api/users/${uid}`, { method: 'DELETE' })
        .then(r => r.json())
        .then(data => {
            if (data.success) {
                loadUsers(currentPage);
            } else {
                // API returns an error if you try to delete an admin account
                alert(data.error || 'Delete failed.');
                btn.disabled = false;
            }
        });
}


/* ── Pagination buttons ───────────────────────────────────────────────────── */
function renderPagination(page, pages) {
    const div = document.getElementById('pagination');
    if (pages <= 1) { div.innerHTML = ''; return; }

    let html = '';
    html += `<button class="btn btn-sm btn-outline-secondary"
                     ${page === 1 ? 'disabled' : ''}
                     onclick="loadUsers(${page - 1})">‹ Prev</button>`;

    const start = Math.max(1, page - 2);
    const end   = Math.min(pages, page + 2);
    for (let i = start; i <= end; i++) {
        html += `<button class="btn btn-sm ${i === page ? 'btn-primary' : 'btn-outline-secondary'}"
                         onclick="loadUsers(${i})">${i}</button>`;
    }

    html += `<button class="btn btn-sm btn-outline-secondary"
                     ${page === pages ? 'disabled' : ''}
                     onclick="loadUsers(${page + 1})">Next ›</button>`;

    div.innerHTML = html;
}


/* ── Escape HTML to prevent XSS ──────────────────────────────────────────── */
function escHtml(str) {
    return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
}


/* ── Initial load ─────────────────────────────────────────────────────────── */
loadUsers();
</script>
{% endblock %}
